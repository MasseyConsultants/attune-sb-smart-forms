# =============================================================================
# attune-sb-smart-forms — Docker Compose (Production, single-host VPS)
# Author: Robert Massey | Created: 2026-07-15
#
# Lives at /opt/attune-sb/docker-compose.prod.yml on the VPS next to a .env
# file (copy docker/env.production.example there and fill it in).
# The host nginx terminates TLS and proxies to the loopback-bound ports below;
# postgres/redis are reachable only on the internal Docker network.
#
# Azure note: this file is the single-host pathway. On Azure the api/web images
# run unchanged (Container Apps or a VM); postgres/redis move to managed
# services by re-pointing DATABASE_URL / REDIS_* — see docs/DEPLOYMENT.md.
# =============================================================================

name: attune-sb

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: attune
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set in .env}
      POSTGRES_DB: attune_sb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U attune -d attune_sb']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ['redis-server', '--requirepass', '${REDIS_PASSWORD:?set in .env}']
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD-SHELL', 'redis-cli -a "$$REDIS_PASSWORD" ping | grep PONG']
      interval: 10s
      timeout: 5s
      retries: 5
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}

  api:
    image: ${API_IMAGE:-ghcr.io/masseyconsultants/attune-sb-smart-forms-api:latest}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Loopback only — the host nginx is the sole public entry point.
    ports:
      - '127.0.0.1:3101:3101'
    env_file: .env
    environment:
      NODE_ENV: production
      API_PORT: 3101
      DATABASE_URL: postgresql://attune:${POSTGRES_PASSWORD}@postgres:5432/attune_sb?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      APP_URL: https://${DOMAIN:?set in .env}
      API_PUBLIC_URL: https://${DOMAIN}
      CORS_ORIGINS: https://${DOMAIN}
      STORAGE_LOCAL_DIR: /app/storage
    volumes:
      # Customer blobs (uploaded templates, filled PDFs, workflow artifacts).
      # Named volume = survives image rebuilds; include it in backups.
      - api_storage:/app/storage
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://localhost:3101/api/v1/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  web:
    image: ${WEB_IMAGE:-ghcr.io/masseyconsultants/attune-sb-smart-forms-web:latest}
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - '127.0.0.1:3100:3100'
    environment:
      NODE_ENV: production
      INTERNAL_API_URL: http://api:3101/api/v1
      INTERNAL_API_KEY: ${INTERNAL_API_KEY}
      APP_URL: https://${DOMAIN}
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://localhost:3100/login').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

volumes:
  postgres_data:
  redis_data:
  api_storage:
